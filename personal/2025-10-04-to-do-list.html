<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List — 04 October 2025</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 0 24px; color: #1a1a1a; background: #fff; line-height: 1.7; }
    header { border-bottom: 2px solid #3b5bdb; padding-bottom: 16px; margin-bottom: 28px; }
    h1 { font-size: 1.6rem; margin: 0 0 8px; color: #1a1a1a; }
    .meta { font-size: 0.85rem; color: #666; display: flex; gap: 16px; flex-wrap: wrap; }
    .tag { padding: 2px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .tag.personal { background: #e8f5e9; color: #2e7d32; }
    .note-body { margin-bottom: 32px; }
    .item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .item:last-child { border-bottom: none; }
    .item.done { opacity: 0.5; text-decoration: line-through; }
    .checkbox { font-size: 1rem; flex-shrink: 0; }
    .back-link { display: inline-block; margin-top: 32px; font-size: 0.85rem; color: #3b5bdb; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>To-Do List</h1>
    <div class="meta">
      <span>04 October 2025</span>
      <span class="tag personal">Personal</span>
    </div>
  </header>
  <div class="note-body">
    <div class="item"><span class="checkbox">☐</span><span>Social media plan</span></div>
    <div class="item done"><span class="checkbox">☑</span><span>Car spray</span></div>
    <div class="item done"><span class="checkbox">☑</span><span>Library book</span></div>
    <div class="item done"><span class="checkbox">☑</span><span>Expenses</span></div>
    <div class="item done"><span class="checkbox">☑</span><span>Drone pick up</span></div>
    <div class="item done"><span class="checkbox">☑</span><span>GR insurance</span></div>
  </div>
  <a href="../index.html" class="back-link">← Back to dashboard</a>
</body>
</html>
