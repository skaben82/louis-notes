      color: #1a1a1a;

    }

    /* ── Header ── */

      background: #fff;
      border-bottom: 1px solid #e4e7ef;

      position: sticky;
      top: 0;
      z-index: 10;
    }
    .site-header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.02em;
    }
    .site-header h1 span { color: #3b5bdb; }
    .header-meta { font-size: 0.8rem; color: #888; }

    /* ── Layout ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* ── Actions panel ── */
    .actions-panel {
      background: #fff;
      border: 1px solid #e4e7ef;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 28px;
    }
    .actions-panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .actions-panel-header h2 {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #3b5bdb;
    }
    .actions-count {
      background: #3b5bdb;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .actions-count.has-overdue { background: #c62828; }

    .action-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f2f8;
      font-size: 0.9rem;
    }
    .action-row:last-child { border-bottom: none; }
    .action-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #3b5bdb; flex-shrink: 0;
    }
    .action-dot.overdue { background: #c62828; }
    .action-dot.no-date { background: #bbb; }
    .action-row-text { flex: 1; color: #1a1a1a; }
    .action-row-note { font-size: 0.78rem; color: #888; }
    .action-row-date {
      font-size: 0.78rem;
      font-weight: 600;
      color: #fff;
      background: #3b5bdb;
      padding: 2px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .action-row-date.overdue { background: #c62828; }
    .action-row-date.no-date { background: #aaa; }

    /* ── Stats cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #e4e7ef;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
    }
    .stat-card-number {
      font-size: 1.8rem;
      font-weight: 700;
      color: #3b5bdb;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-card-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
    }

    /* ── Search and filters ── */
    .controls-section {
      background: #fff;
      border: 1px solid #e4e7ef;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 28px;
    }
    .search-box {
      width: 100%;
      padding: 12px 16px;
      font-size: 0.95rem;
      border: 1px solid #e4e7ef;
      border-radius: 8px;
      margin-bottom: 16px;
      font-family: inherit;
    }
    .search-box:focus {
      outline: none;
      border-color: #3b5bdb;
      box-shadow: 0 0 0 2px rgba(59, 91, 219, 0.1);
    }

    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .filter-btn {
      padding: 8px 16px;
      border: 1px solid #e4e7ef;
      background: #fff;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #666;
    }
    .filter-btn:hover {
      border-color: #3b5bdb;
      color: #3b5bdb;
    }
    .filter-btn.active {
      background: #3b5bdb;
      color: #fff;
      border-color: #3b5bdb;
    }

    /* ── Notes grid ── */
    .notes-section {
      margin-bottom: 32px;
    }
    .notes-section-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #f0f2f8;
    }
    .notes-section-header h2 {

      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
    }
    .notes-section-count {
      font-size: 0.85rem;
      color: #888;
    }

    .notes-grid {

      gap: 16px;
      margin-bottom: 32px;
    }

    .note-card {

      border: 1px solid #e4e7ef;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .note-card:hover {
      border-color: #3b5bdb;
      box-shadow: 0 4px 12px rgba(59, 91, 219, 0.08);
    }

    .note-card-header {

      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .note-card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.4;
      flex: 1;

      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 18px;
      padding: 0;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;

    }
    .note-card-delete-btn:hover {
      color: #c62828;
    }

    .note-card-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .note-card-date {
      font-size: 0.78rem;
      color: #888;
    }
    .note-card-tag {

      font-size: 0.7rem;
      font-weight: 600;

      letter-spacing: 0.04em;

    .note-card-tag.content { background: #fff3e0; color: #e65100; }
    .note-card-tag.side-hustle { background: #fce4ec; color: #c62828; }

      color: #666;

      margin-bottom: 12px;

      font-weight: 600;

      margin-bottom: 12px;

      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;

      border-radius: 12px;
      padding: 32px;

      color: #fff;

    // Safe localStorage wrappers — iOS Safari on file:// URLs can throw
    function getDeletedNotes() {
      try {
        return JSON.parse(localStorage.getItem('deletedNotes') || '[]');
      } catch (e) {
        return [];
      }
    }

    function saveDeletedNotes(deleted) {
      try {
        localStorage.setItem('deletedNotes', JSON.stringify(deleted));
      } catch (e) {
        // localStorage unavailable (e.g. iOS file:// restriction) — skip silently
      }
    }

    function isNoteDeleted(file) {
      return getDeletedNotes().includes(file);
    }

    function updateHeaderMeta() {
      // Date dashboard file was last modified — use today as proxy (set at file-write time)
      const today = new Date();
      const dashboardDate = today.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

      // Date of the most recent note in the manifest
      const deleted = getDeletedNotes();
      const activenotes = MANIFEST.filter(n => !deleted.includes(n.file));
      let latestNoteDate = null;
      if (activenotes.length > 0) {
        const sorted = [...activenotes].sort((a, b) => new Date(b.date) - new Date(a.date));
        latestNoteDate = sorted[0].date;
      }
      const lastNoteFormatted = latestNoteDate
        ? new Date(latestNoteDate + 'T12:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
        : 'No notes';

      const el = document.getElementById('headerMeta');
      if (el) {
        el.textContent = 'Dashboard updated ' + dashboardDate + '  ·  Latest note ' + lastNoteFormatted;
      }
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'No date';
      const [year, month, day] = dateStr.split('-');
      const d = new Date(year, parseInt(month) - 1, day);
      return d.toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function isOverdue(dateStr) {
      if (!dateStr) return false;
      const noteDate = new Date(dateStr);
      return noteDate < new Date();
    }

    function renderDashboard() {
      const deleted = getDeletedNotes();
      const notes = allNotes.filter(n => !deleted.includes(n.file));

      // Update stats
      document.getElementById('totalNotesCount').textContent = notes.length;
      document.getElementById('workNotesCount').textContent = notes.filter(n => n.area === 'work').length;
      document.getElementById('personalNotesCount').textContent = notes.filter(n => n.area === 'personal').length;
      document.getElementById('contentNotesCount').textContent = notes.filter(n => n.area === 'content').length;
      document.getElementById('sideHustleNotesCount').textContent = notes.filter(n => n.area === 'side-hustle').length;

      // Render actions
      const allActions = [];
      notes.forEach(note => {
        if (note.actions && note.actions.length > 0) {
          note.actions.forEach(action => {
            allActions.push({
              text: action.text,
              date: action.date,
              noteTitle: note.title
            });
          });
        }
      });

      if (allActions.length > 0) {
        document.getElementById('actionsPanel').style.display = 'block';
        document.getElementById('noActionsPanel').style.display = 'none';
        document.getElementById('actionsCount').textContent = allActions.length;

        const actionsList = document.getElementById('actionsList');
        actionsList.innerHTML = allActions
          .sort((a, b) => {
            if (!a.date && !b.date) return 0;
            if (!a.date) return 1;
            if (!b.date) return -1;
            return new Date(a.date) - new Date(b.date);
          })
          .map(action => {
            const overdue = action.date && isOverdue(action.date);
            return `
              <div class="action-row">
                <div class="action-dot ${overdue ? 'overdue' : (action.date ? '' : 'no-date')}"></div>
                <div style="flex: 1;">
                  <div class="action-row-text">${action.text}</div>
                  <div class="action-row-note">${action.noteTitle}</div>
                </div>
                <span class="action-row-date ${overdue ? 'overdue' : (action.date ? '' : 'no-date')}">
                  ${action.date ? formatDate(action.date) : 'No date'}
                </span>
              </div>
            `;
          })
          .join('');
      } else {
        document.getElementById('actionsPanel').style.display = 'none';
        document.getElementById('noActionsPanel').style.display = 'block';
      }

      // Filter and search
      let filtered = notes;
      if (currentFilter !== 'all') {
        filtered = filtered.filter(n => n.area === currentFilter);
      }
      if (currentSearch) {
        const search = currentSearch.toLowerCase();
        filtered = filtered.filter(n =>
          n.title.toLowerCase().includes(search) ||
          n.snippet.toLowerCase().includes(search)
        );
      }

      // Group by area
      const grouped = {};
      filtered.forEach(note => {
        if (!grouped[note.area]) grouped[note.area] = [];
        grouped[note.area].push(note);
      });

      // Sort areas
      const areaOrder = ['work', 'personal', 'content', 'side-hustle'];
      const container = document.getElementById('notesContainer');
      let html = '';

      areaOrder.forEach(area => {
        if (grouped[area] && grouped[area].length > 0) {
          const areaLabel = { work: 'Work', personal: 'Personal', content: 'Content', 'side-hustle': 'Side Hustle' }[area];
          const areaNotesCount = grouped[area].length;

          html += `<div class="notes-section">
            <div class="notes-section-header">
              <h2>${areaLabel}</h2>
              <span class="notes-section-count">${areaNotesCount} ${areaNotesCount === 1 ? 'note' : 'notes'}</span>
            </div>
            <div class="notes-grid">`;

          grouped[area]
            .sort((a, b) => new Date(b.date) - new Date(a.date))
            .forEach(note => {
              const actionCount = note.actions ? note.actions.length : 0;
              html += `
                <div class="note-card" onclick="openNote('${note.file}')">
                  <div class="note-card-header">
                    <div class="note-card-title">${note.title}</div>
                    <button class="note-card-delete-btn" onclick="deleteNote(event, '${note.file}')">✕</button>
                  </div>
                  <div class="note-card-meta">
                    <div class="note-card-date">${formatDate(note.date)}</div>
                    <span class="note-card-tag ${area}">${areaLabel}</span>
                  </div>
                  <div class="note-card-snippet">${note.snippet}</div>
                  ${actionCount > 0 ? `<div class="note-card-actions">${actionCount} action${actionCount === 1 ? '' : 's'}</div>` : ''}
                </div>
              `;
            });

          html += `</div></div>`;
        }
      });

      if (filtered.length === 0) {
        html = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>No notes found. Try adjusting your filters or search.</p></div>';
      }

      container.innerHTML = html;
    }

    function openNote(file) {
      window.location.href = file;
    }

    function deleteNote(event, file) {
      event.stopPropagation();
      deleteTargetFile = file;
      document.getElementById('deleteModal').classList.add('show');
    }

    function confirmDelete() {
      if (deleteTargetFile) {
        const deleted = getDeletedNotes();
        if (!deleted.includes(deleteTargetFile)) {
          deleted.push(deleteTargetFile);
          saveDeletedNotes(deleted);
        }
        deleteTargetFile = null;
        document.getElementById('deleteModal').classList.remove('show');
        renderDashboard();
      }
    }

    function cancelDelete() {
      deleteTargetFile = null;
      document.getElementById('deleteModal').classList.remove('show');
    }

    // Wait for DOM to be fully ready, then initialize
    function initializeDashboard() {
      try {
        // Defensive checks
        if (typeof MANIFEST === 'undefined' || !Array.isArray(MANIFEST)) {
          console.error('MANIFEST data is not defined or not an array');
          return;
        }

        if (MANIFEST.length === 0) {
          console.warn('MANIFEST is empty');
        } else {
          console.log('MANIFEST loaded successfully with ' + MANIFEST.length + ' notes');
        }

        allNotes = MANIFEST;

        // Set up event listeners
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
          searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderDashboard();
          });
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderDashboard();
          });
        });

        const confirmDeleteBtn = document.getElementById('confirmDelete');
        const cancelDeleteBtn = document.getElementById('cancelDelete');
        const deleteModal = document.getElementById('deleteModal');

        if (confirmDeleteBtn) confirmDeleteBtn.addEventListener('click', confirmDelete);
        if (cancelDeleteBtn) cancelDeleteBtn.addEventListener('click', cancelDelete);
        if (deleteModal) {
          deleteModal.addEventListener('click', (e) => {
            if (e.target === deleteModal) {
              cancelDelete();
            }
          });
        }

        // Initial render
        console.log('Calling renderDashboard...');
        renderDashboard();
        updateHeaderMeta();
        console.log('Dashboard rendered');
      } catch (e) {
        console.error('Error initializing dashboard:', e.message);
      }
    }

    // Initialize immediately (script is at end of body)
    initializeDashboard();

    // Fallback: if dashboard is still showing 0 notes after a short delay,
    // force a re-render (handles timing issues on some browsers)
    setTimeout(() => {
      const totalCount = parseInt(document.getElementById('totalNotesCount')?.textContent || '0');
      if (totalCount === 0 && MANIFEST && MANIFEST.length > 0) {
        console.log('Dashboard empty despite having data. Force re-rendering...');
        allNotes = MANIFEST;
        renderDashboard();
        updateHeaderMeta();
      }
    }, 500);
  </script>
</body>
</html>
